# Generated automatically via Dunst Python Compiler

[global]
    default_pause_level = 0
    monitor = 0
    follow = "keyboard"
    enable_posix_regex = true
    width = 350
    height = (0, 400)
    notification_limit = 5
    origin = "bottom-right"
    offset = (20, 20)
    scale = 0
    progress_bar = true
    progress_bar_horizontal_alignment = "center"
    progress_bar_height = 12
    progress_bar_min_width = 100
    progress_bar_max_width = 1000
    progress_bar_frame_width = 1
    progress_bar_corner_radius = 5
    progress_bar_corners = "all"
    icon_corner_radius = 5
    icon_corners = "all"
    indicate_hidden = true
    transparency = 10
    separator_height = 0
    padding = 8
    horizontal_padding = 8
    text_icon_padding = 0
    frame_width = 3
    gap_size = 8
    separator_color = "frame"
    sort = "urgency_descending"
    idle_threshold = 0
    layer = "overlay"
    force_xwayland = false
    font = "Monospace 12"
    line_height = 1
    format = "<b>%s</b>\n%b"
    vertical_alignment = "center"
    show_age_threshold = 60
    ignore_newline = false
    stack_duplicates = true
    hide_duplicate_count = false
    show_indicators = true
    icon_path = "/usr/share/icons/Papirus"
    icon_theme = "Papirus"
    enable_recursive_icon_lookup = true
    sticky_history = true
    history_length = 10000
    dmenu = "/usr/local/bin/dmenu -p dunst"
    browser = "/usr/bin/xdg-open"
    always_run_script = false
    title = "Dunst"
    class = "Dunst"
    force_xinerama = false
    corner_radius = 10
    corners = "all"
    mouse_left_click = "do_action, close_current"
    mouse_middle_click = "close_all"
    mouse_right_click = "close_current"
    ignore_dbusclose = true
    override_pause_level = 0

[urgency_low]
    background = "#1d2021"
    foreground = "#928374"
    timeout = 5

[urgency_normal]
    background = "#458588"
    foreground = "#ebdbb2"
    timeout = 7

[urgency_critical]
    background = "#9d0006"
    foreground = "#ebdbb2"
    frame_color = "#fabd2f"
    timeout = 10

[fullscreen_delay_everything]
    fullscreen = "delay"

[fullscreen_show_critical]
    fullscreen = "show"
    msg_urgency = "critical"
