# Insert a blank line between shell prompts
add_newline = true

command_timeout = 1000 # 500 ms

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_aqua   = '#689d6a'
color_bg1    = '#3c3836'
color_bg3    = '#665c54'
color_blue   = '#458588'
color_fg0    = '#fbf1c7'
color_fg1    = '#000000'
color_green  = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red    = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = true
style    = "bg:color_orange fg:color_fg0"

    [os.symbols]
    Alpine           = "´îÇ"
    Amazon           = "´ë░"
    Android          = "¯£Ä"
    Arch             = "¾░úç"
    Artix            = "¾░úç"
    CentOS           = "´îä"
    Debian           = "¾░úÜ"
    EndeavourOS      = "´åù"
    Fedora           = "¾░úø"
    Gentoo           = "¾░ú¿"
    Linux            = "¾░î¢"
    Macos            = "¾░ÇÁ"
    Manjaro          = "´îÆ"
    Mint             = "¾░ú¡"
    Pop              = "´î¬"
    Raspbian         = "¾░É┐"
    RedHatEnterprise = "¾▒äø"
    Redhat           = "¾▒äø"
    SUSE             = "´îö"
    Ubuntu           = "¾░òê"
    Windows          = "¾░ì▓"

[username]
disabled   = true
format     = '[ $user ]($style)'
style_root = "bg:color_orange fg:color_fg0"
style_user = "bg:color_orange fg:color_fg0"

[directory]
format            = "[ $path ]($style)"
style             = "fg:color_fg1 bg:color_yellow"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[git_branch]
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'
style  = "bg:color_aqua"
symbol = "´Éÿ"

[git_status]
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'
style  = "bg:color_aqua"

[nodejs]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "¯£ÿ"

[c]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "¯ÿ× "

[rust]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "¯×¿"

[golang]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "¯ÿº"

[php]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "¯ÿê"

[java]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "¯ëû"

[kotlin]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "¯ÿ┤"

[haskell]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "¯ÿƒ"

[python]
format             = '[[ $symbol( $version) (\($virtualenv\)) ](fg:color_fg0 bg:color_blue)]($style)'
pyenv_version_name = false
style              = "bg:color_blue"
symbol             = "¯ÿå"

[docker_context]
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'
style  = "bg:color_bg3"
symbol = "´îê"

[conda]
format = '[[ $symbol( $environment) ](fg:#83a598 bg:color_bg3)]($style)'
style  = "bg:color_bg3"

[env_var.yazi_level]
description = "Indicate the shell was launched by `yazi`"
format      = '[[ $symbol ](fg:color_fg0 bg:color_aqua)]($style)'
symbol      = "­ƒªå"                                                 # Duck
variable    = "YAZI_LEVEL"

[time]
disabled    = false
format      = '[[ ´É║ $time ](fg:color_fg0 bg:color_bg1)]($style)'
style       = "bg:color_bg1"
time_format = "%R"

[line_break]
disabled = false

[character]
disabled                  = false
error_symbol              = '[´É▓](bold fg:color_red)'
success_symbol            = '[´É▓](bold fg:color_green)'
vimcmd_replace_one_symbol = '[´É┤](bold fg:color_purple)'
vimcmd_replace_symbol     = '[´É┤](bold fg:color_purple)'
vimcmd_symbol             = '[´É┤](bold fg:color_green)'
vimcmd_visual_symbol      = '[´É┤](bold fg:color_yellow)'
