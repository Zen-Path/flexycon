# {{@@ header() @@}}

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[î‚¶](color_orange)\
$os\
$username\
[î‚°](bg:color_yellow fg:color_orange)\
$directory\
[î‚°](fg:color_yellow bg:color_aqua)\
${env_var.yazi_level}\
$git_branch\
$git_status\
[î‚°](fg:color_aqua bg:color_blue)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[î‚°](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
[î‚°](fg:color_bg3 bg:color_bg1)\
$time\
[î‚´ ](fg:color_bg1)\
