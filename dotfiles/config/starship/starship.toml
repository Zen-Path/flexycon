# Insert a blank line between shell prompts
add_newline = true

command_timeout = 1000 # 500 ms

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_aqua   = '#689d6a'
color_bg1    = '#3c3836'
color_bg3    = '#665c54'
color_blue   = '#458588'
color_fg0    = '#fbf1c7'
color_fg1    = '#000000'
color_green  = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red    = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = true
style    = "bg:color_orange fg:color_fg0"

    [os.symbols]
    Alpine           = "ïŒ€"
    Amazon           = "ï‰°"
    Android          = "îœژ"
    Arch             = "َ°£‡"
    Artix            = "َ°£‡"
    CentOS           = "ïŒ„"
    Debian           = "َ°£ڑ"
    EndeavourOS      = "ï†—"
    Fedora           = "َ°£›"
    Gentoo           = "َ°£¨"
    Linux            = "َ°Œ½"
    Macos            = "َ°€µ"
    Manjaro          = "ïŒ’"
    Mint             = "َ°£­"
    Pop              = "ïŒھ"
    Raspbian         = "َ°گ؟"
    RedHatEnterprise = "َ±„›"
    Redhat           = "َ±„›"
    SUSE             = "ïŒ”"
    Ubuntu           = "َ°•ˆ"
    Windows          = "َ°چ²"

[username]
disabled   = true
format     = '[ $user ]($style)'
style_root = "bg:color_orange fg:color_fg0"
style_user = "bg:color_orange fg:color_fg0"

[directory]
format            = "[ $path ]($style)"
style             = "fg:color_fg1 bg:color_yellow"
truncation_length = 3
truncation_symbol = "â€¦/"

[git_branch]
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'
style  = "bg:color_aqua"
symbol = "ïگک"

[git_status]
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'
style  = "bg:color_aqua"

[nodejs]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "îœک"

[c]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "îک‍ "

[rust]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "î‍¨"

[golang]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "îک§"

[php]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "îکˆ"

[java]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "î‰–"

[kotlin]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "îک´"

[haskell]
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
style  = "bg:color_blue"
symbol = "îکں"

[python]
format             = '[[ $symbol( $version) (\($virtualenv\)) ](fg:color_fg0 bg:color_blue)]($style)'
pyenv_version_name = false
style              = "bg:color_blue"
symbol             = "îک†"

[docker_context]
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'
style  = "bg:color_bg3"
symbol = "ïŒˆ"

[conda]
format = '[[ $symbol( $environment) ](fg:#83a598 bg:color_bg3)]($style)'
style  = "bg:color_bg3"

[env_var.yazi_level]
description = "Indicate the shell was launched by `yazi`"
format      = '[[ $symbol ](fg:color_fg0 bg:color_aqua)]($style)'
symbol      = "ًں¦†"                                                 # Duck
variable    = "YAZI_LEVEL"

[time]
disabled    = false
format      = '[[ ïگ؛ $time ](fg:color_fg0 bg:color_bg1)]($style)'
style       = "bg:color_bg1"
time_format = "%R"

[line_break]
disabled = false

[character]
disabled                  = false
error_symbol              = '[ïگ²](bold fg:color_red)'
success_symbol            = '[ïگ²](bold fg:color_green)'
vimcmd_replace_one_symbol = '[ïگ´](bold fg:color_purple)'
vimcmd_replace_symbol     = '[ïگ´](bold fg:color_purple)'
vimcmd_symbol             = '[ïگ´](bold fg:color_green)'
vimcmd_visual_symbol      = '[ïگ´](bold fg:color_yellow)'
