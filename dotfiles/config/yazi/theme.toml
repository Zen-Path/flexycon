# If the user's terminal is in dark mode, Yazi will load `theme-dark.toml` on startup; otherwise, `theme-light.toml`.
# You can override any parts of them that are not related to the dark/light mode in your own `theme.toml`.

# If you want to dynamically override their content based on dark/light mode, you can specify two different flavors
# for dark and light modes under `[flavor]`, and do so in those flavors instead.

#:schema https://yazi-rs.github.io/schemas/theme.json
# vim:fileencoding=utf-8:foldmethod=marker

[flavor]
dark  = ""
light = ""

[indicator]
current = { reversed = true }
preview = { underline = true }

# {%@@- if env['TERMINAL'] == "alacritty" +@@%}
# For square indicators, use:
padding = { open = "‚Ėą", close = "‚Ėą" }
# {%@@- endif +@@%}

[mgr]
cwd = { fg = "cyan" }

# Find
find_keyword  = { fg = "yellow", bold = true, italic = true, underline = true }
find_position = { fg = "magenta", bg = "reset", bold = true, italic = true }

# Marker
marker_copied   = { fg = "lightgreen", bg = "lightgreen" }
marker_cut      = { fg = "lightred", bg = "lightred" }
marker_marked   = { fg = "lightcyan", bg = "lightcyan" }
marker_selected = { fg = "lightyellow", bg = "lightyellow" }

# Count
count_copied   = { fg = "black", bg = "lightgreen" }
count_cut      = { fg = "black", bg = "lightred" }
count_selected = { fg = "black", bg = "lightyellow" }

# Border
border_style  = { fg = "lightred" }
border_symbol = "‚Ēā"

# Highlighting
syntect_theme = ""

[tabs]
active   = { fg = "red", bg = "lightyellow", bold = true }
inactive = { fg = "lightyellow", bg = "red" }

[mode]

normal_alt  = { fg = "blue", bg = "gray" }
normal_main = { bg = "blue", bold = true }

# Select mode
select_alt  = { fg = "red", bg = "gray" }
select_main = { bg = "red", bold = true }

# Unset mode
unset_alt  = { fg = "red", bg = "gray" }
unset_main = { bg = "red", bold = true }

[status]
overall = { fg = "white", bg = "reset" }
# {%@@- if env['TERMINAL'] == "alacritty" +@@%}
sep_left  = { open = "Óā∂", close = "Óāį" }
sep_right = { open = "Óā∂", close = "Óāį" }
# {%@@- else +@@%}
sep_left  = { open = "Óā∂", close = "Óāī" }
sep_right = { open = "Óā∂", close = "Óāī" }
# {%@@- endif +@@%}


# Progress
progress_error  = { fg = "red", bg = "black" }
progress_label  = { bold = true }
progress_normal = { fg = "blue", bg = "black" }

# Permissions
perm_exec  = { fg = "cyan" }
perm_read  = { fg = "yellow" }
perm_sep   = { fg = "darkgray" }
perm_type  = { fg = "green" }
perm_write = { fg = "red" }

[pick]
active   = { fg = "magenta", bold = true }
border   = { fg = "blue" }
inactive = {}

[input]
border   = { fg = "blue" }
selected = { reversed = true }
title    = {}
value    = {}

[confirm]
body       = {}
border     = { fg = "blue" }
btn_labels = ["  [Y]es  ", "  (N)o  "]
btn_no     = {}
btn_yes    = { reversed = true }
list       = {}
title      = { fg = "blue" }

[cmp]
active   = { reversed = true }
border   = { fg = "blue" }
inactive = {}

# Icons
icon_command = "ÔíČ"
icon_file    = "ÔÖõ"
icon_folder  = "ÔĄē"

[tasks]
border  = { fg = "blue" }
hovered = { fg = "magenta", underline = true }
title   = {}

[which]
cand            = { fg = "lightcyan" }
cols            = 3
desc            = { fg = "lightmagenta" }
mask            = { bg = "black" }
rest            = { fg = "darkgray" }
separator       = " Ó™ú "
separator_style = { fg = "darkgray" }

[help]
desc    = {}
footer  = { fg = "black", bg = "white" }
hovered = { reversed = true, bold = true }
on      = { fg = "cyan" }
run     = { fg = "magenta" }

[notify]
title_error = { fg = "red" }
title_info  = { fg = "green" }
title_warn  = { fg = "yellow" }

# Icons
icon_error = "ÔĀó"
icon_info  = "ÔĀö"
icon_warn  = "ÔĀĪ"

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#d17e47" },

    # Media
    { mime = "{audio,video}/*", fg = "magenta" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "red" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "cyan" },

    # Empty files
    # { mime = "inode/empty", fg = "red" },

    # Special files
    { url = "*", is = "orphan", bg = "red" },
    { url = "*", is = "exec", fg = "green" },

    # Dummy files
    { url = "*", is = "dummy", bg = "red" },
    { url = "*/", is = "dummy", bg = "red" },

    # Fallback
    { url = "*", fg = "gray" },
    { url = "*/", fg = "blue", bold = true },
]

[icon]

conds = [
    # Special files
    { if = "orphan", text = "ÔĀĪ" },
    { if = "link", text = "ÔíĀ" },
    { if = "block", text = "ÔÉČ" },
