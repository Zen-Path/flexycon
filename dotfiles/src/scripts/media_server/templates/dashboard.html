<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Live Dashboard</title>
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/dashboard.css') }}" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        <link
            rel="icon"
            type="image/png"
            href="{{ url_for('static', filename='favicon.png') }}" />
    </head>
    <body>
        <div class="header-row">
            <h2>Download History</h2>

            <div class="search-container">
                <input
                    type="text"
                    id="searchInput"
                    oninput="filterTable()"
                    placeholder="Search title or URL..." />
                <i
                    class="fa-solid fa-times clear-search"
                    id="clearBtn"
                    style="display: none"
                    onclick="clearSearch()"></i>
            </div>

            <div class="button-group">
                <div class="limit-container">
                    <label
                        for="rowLimit"
                        style="font-size: 0.85em; color: var(--text-muted)"
                        >Show:</label
                    >
                    <select
                        id="rowLimit"
                        onchange="sortTable(currentSortCol)"
                        class="limit-select">
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100" selected>100</option>
                        <option value="500">500</option>
                        <option value="0">Unlimited</option>
                    </select>
                </div>
                <button id="themeToggle" class="btn-base theme-toggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>

        <table id="dataTable">
            <tr>
                <th class="col-check">
                    <input
                        type="checkbox"
                        id="selectAll"
                        onclick="toggleSelectAll(this.checked)" />
                </th>
                <th id="th-id" onclick="sortTable('id')">ID</th>
                <th id="th-mediaType" onclick="sortTable('mediaType')">Type</th>
                <th id="th-title" onclick="sortTable('title')">Title / URL</th>
                <th id="th-startTime" onclick="sortTable('startTime')">Time</th>
                <th class="col-actions">
                    <div class="dropdown">
                        <button class="action-btn menu-trigger">
                            <i class="fa-solid fa-ellipsis-vertical"></i>
                        </button>
                        <div class="dropdown-content">
                            <a
                                href="#"
                                class="menu-item"
                                onclick="unifiedEdit(getActiveIds())"
                                ><i class="fa-solid fa-pen"></i> Edit
                                Selected</a
                            >
                            <a
                                href="#"
                                class="menu-item"
                                onclick="unifiedCopy(getActiveIds(), 'title')"
                                ><i class="fa-solid fa-quote-left"></i> Copy
                                Titles</a
                            >
                            <a
                                href="#"
                                class="menu-item"
                                onclick="unifiedCopy(getActiveIds(), 'url')"
                                ><i class="fa-solid fa-link"></i> Copy URLs</a
                            >
                            <hr />
                            <a
                                href="#"
                                class="menu-item danger"
                                onclick="unifiedDelete(getActiveIds())"
                                ><i class="fa-solid fa-trash"></i> Delete
                                Selected</a
                            >
                        </div>
                    </div>
                </th>
            </tr>
            <tbody id="table-body"></tbody>
        </table>

        <div class="modal-overlay" id="editModal">
            <div class="modal">
                <div class="modal-header">
                    <h3>Edit Entry</h3>
                    <span id="affectedCount"></span>
                </div>

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="editTitle" />
                </div>

                <div class="form-group">
                    <label>Media Type</label>
                    <select id="editMediaType">
                        <option value="image">Image</option>
                        <option value="video">Video</option>
                        <option value="gallery">Gallery</option>
                        <option value="unknown">Unknown</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button class="modal-btn btn-cancel" onclick="closeModal()">
                        Cancel
                    </button>
                    <button class="modal-btn btn-save" onclick="saveEdit()">
                        Save Changes
                    </button>
                </div>
            </div>
        </div>

        <script>
            window.MEDIA_SERVER_KEY =
                "{{ config.get('MEDIA_SERVER_KEY', '') }}";
        </script>
        <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    </body>
</html>
