repos:
  - repo: https://github.com/psf/black
    rev: 25.1.0  # Use a specific version; update as needed.
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0  # Use a specific version; update as needed.
    hooks:
      - id: mypy

  - repo: https://github.com/pycqa/flake8
    rev: 6.0.0  # Use a specific version; update as needed.
    hooks:
      - id: flake8
